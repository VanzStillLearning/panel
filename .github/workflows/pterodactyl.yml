name: Ptero Server Loop (Ngrok Version)

on:
  workflow_dispatch: # Pemicu manual pertama kali
  repository_dispatch:
    types: [reboot_server] # Dipicu oleh API pada jam ke-5

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Docker & Tar
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose tar wget unzip

      - name: Ekstrak Backup (Jika Ada)
        run: |
          if [ -f backup.tar.gz ]; then
            echo "Menemukan file backup, mengekstrak data..."
            tar -xzvf backup.tar.gz
          else
            echo "Tidak ada backup, memulai server baru."
          fi

      - name: Install & Jalankan Ngrok
        run: |
          # Download dan install Ngrok resmi
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.dev/ngrok.asc >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.dev/ngrok.asc] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          
          # Autentikasi token
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
          
          # Menjalankan HTTP tunnel untuk Panel Pterodactyl (Port 80) di background
          # Catatan: Jika butuh membuka port Wings (8080/2022), akun Ngrok gratisan terbatas hanya 1 tunnel aktif secara bersamaan.
          nohup ngrok http 80 --log=stdout > ngrok.log 2>&1 &
          
          echo "Ngrok berhasil dijalankan di background!"
          sleep 5
          echo "=== LINK URL NGROK KAMU ==="
          curl -s http://127.0.0.1:4040/api/tunnels | grep -o '"public_url":"[^"]*' | grep -o 'http.*'
          echo "==========================="

      - name: Jalankan Pterodactyl & Wings
        run: |
          docker-compose up -d
          echo "Pterodactyl Panel dan Wings berhasil dijalankan!"

      - name: Server Aktif (Timer 5 Jam)
        run: |
          echo "Server sedang berjalan. Menahan runner selama 5 jam..."
          sleep 18000 # 5 jam (dalam hitungan detik)

      - name: Auto Backup Data
        run: |
          echo "Batas waktu hampir habis. Menghentikan server..."
          docker-compose down
          
          echo "Mengompres data panel dan wings..."
          tar -czvf backup.tar.gz data/
          
          echo "Mendorong backup ke repositori..."
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add backup.tar.gz
          git commit -m "Auto-backup server data [skip ci]" || echo "Tidak ada perubahan data"
          git push origin main

      - name: Auto Up (Picu Workflow Berikutnya)
        run: |
          echo "Memicu runner baru..."
          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -d '{"event_type": "reboot_server"}'
          
