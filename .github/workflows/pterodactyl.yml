name: Ptero Server Loop

on:
  workflow_dispatch: # Untuk memicu secara manual pertama kali
  repository_dispatch:
    types: [reboot_server] # Untuk dipicu oleh API pada jam ke-5

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Docker & Tar
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose tar wget

      - name: Ekstrak Backup (Jika Ada)
        run: |
          if [ -f backup.tar.gz ]; then
            echo "Menemukan file backup, mengekstrak data..."
            tar -xzvf backup.tar.gz
          else
            echo "Tidak ada backup, memulai server baru."
          fi

      - name: Install & Jalankan Playit.gg
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | sudo apt-key add -
          sudo curl -SsL -o /etc/apt/sources.list.d/playit-cloud.list https://playit-cloud.github.io/ppa/playit-cloud.list
          sudo apt update
          sudo apt install playit
          # Menjalankan Playit di background
          playit setup --secret ${{ secrets.PLAYIT_SECRET }}
          nohup playit run > playit.log 2>&1 &
          echo "Playit.gg berjalan di background."

      - name: Jalankan Pterodactyl & Wings (Auto Install)
        run: |
          docker-compose up -d
          echo "Pterodactyl Panel dan Wings berhasil dijalankan!"

      - name: Server Aktif (Timer 5 Jam)
        run: |
          echo "Server sedang berjalan. Menahan runner selama 5 jam..."
          sleep 18000 # 5 jam dalam hitungan detik

      - name: Auto Backup Data
        run: |
          echo "Batas waktu hampir habis. Menghentikan server..."
          docker-compose down
          
          echo "Mengompres data panel dan wings..."
          tar -czvf backup.tar.gz data/
          
          echo "Mendorong backup ke repositori..."
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add backup.tar.gz
          git commit -m "Auto-backup server data [skip ci]" || echo "Tidak ada perubahan data"
          git push origin main

      - name: Auto Up (Picu Workflow Berikutnya)
        run: |
          echo "Memicu runner baru..."
          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -d '{"event_type": "reboot_server"}'
          
