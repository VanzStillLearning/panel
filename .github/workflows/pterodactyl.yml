name: Ptero Server Loop (Ngrok Version)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [reboot_server]

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Docker & Tar
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose tar wget unzip

      - name: Ekstrak Backup (Jika Ada)
        run: |
          if [ -f backup.tar.gz ]; then
            echo "Menemukan file backup, mengekstrak data..."
            tar -xzvf backup.tar.gz
          else
            echo "Tidak ada backup, memulai server dari awal."
          fi

      - name: Install & Jalankan Ngrok
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/keyrings/ngrok.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/ngrok.asc] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
          nohup ngrok http 80 --log=stdout > ngrok.log 2>&1 &
          sleep 7
          echo "=== LINK URL NGROK KAMU ==="
          curl -s http://127.0.0.1:4040/api/tunnels | grep -o '"public_url":"[^"]*' | grep -o 'http.*' || echo "Gagal mengambil URL"
          echo "==========================="

      - name: Jalankan Pterodactyl & Wings (Auto Setup)
        run: |
          docker-compose up -d
          
          if [ ! -f backup.tar.gz ]; then
            echo "Mengecek kesiapan database MariaDB secara berkala..."
            
            # Ini perintah krusial untuk menahan skrip sampai database benar-benar aktif
            until docker-compose exec -T database mysqladmin ping -h "127.0.0.1" -u pterodactyl -prahasia_ptero --silent; do
                echo "Database belum siap merespons, menunggu 5 detik..."
                sleep 5
            done
            
            echo "Database terdeteksi aktif! Memberi jeda stabilisasi 10 detik..."
            sleep 10
            
            echo "Memulai migrasi struktur database..."
            docker-compose exec -T panel php artisan migrate --seed --force
            
            echo "Membuat akun Admin otomatis..."
            docker-compose exec -T panel php artisan ptero:user --email="admin@gmail.com" --username="admin" --name-first="Admin" --name-last="Ptero" --password="PasswordAdmin123!" --admin=1
            
            echo "Instalasi awal sukses besar!"
          else
            echo "Backup ditemukan, memulihkan data lama."
            sleep 15
          fi

      - name: Server Aktif (Timer 5 Jam)
        run: |
          echo "Server online. Menahan runner selama 5 jam..."
          sleep 18000

      - name: Auto Backup Data
        run: |
          docker-compose down
          tar -czvf backup.tar.gz data/
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add backup.tar.gz
          git commit -m "Auto-backup server data [skip ci]" || echo "Tidak ada perubahan"
          git push origin main

      - name: Auto Up (Picu Loop Baru)
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -d '{"event_type": "reboot_server"}'
          
