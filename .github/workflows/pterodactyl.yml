name: Pterodactyl CI/CD Server

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [auto-restart] 

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Localtunnel (Expose IP)
        run: |
          echo "Menginstal Node.js dan Localtunnel..."
          sudo apt-get install -y nodejs npm
          sudo npm install -g localtunnel
          
          echo "Menjalankan Localtunnel di background..."
          # Menggunakan subdomain khusus agar cocok dengan docker-compose.yml
          lt --port 80 --subdomain my-ptero-panel > tunnel.log 2>&1 &
          
          echo "Menunggu Localtunnel aktif..."
          sleep 10
          
          echo "======================================"
          echo "LINK PTERODACTYL PANEL KAMU:"
          cat tunnel.log
          echo "======================================"

      - name: Install Pterodactyl Panel (Dockerized)
        run: |
          echo "Menjalankan docker-compose.yml..."
          docker compose up -d
          
          # Docker butuh waktu beberapa detik untuk membuat database
          sleep 15 
          
          # Setup awal Panel
          docker exec pterodactyl_panel php artisan key:generate --force || true
          docker exec pterodactyl_panel php artisan migrate --seed --force || true
          
          echo "Pterodactyl Panel berhasil dijalankan via Docker!"

      - name: Install & Configure Wings
        run: |
          echo "Mulai menginstal Wings..."
          sudo mkdir -p /etc/pterodactyl
          
          # Download Wings
          curl -L -o /usr/local/bin/wings "https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64"
          sudo chmod u+x /usr/local/bin/wings
          
          # Memasukkan konfigurasi Wings dari GitHub Secrets
          echo "${{ secrets.WINGS_CONFIG }}" | sudo tee /etc/pterodactyl/config.yml
          
          # Menjalankan Wings di background
          sudo /usr/local/bin/wings &
          echo "Wings berjalan di background!"

      - name: Keep-Alive & Wait for 5 Hours
        run: |
          echo "Server sedang online. Menunggu 5 jam sebelum siklus backup dan restart..."
          # 5 jam = 18000 detik.
          sleep 18000 

      - name: Auto Backup (Setelah 5 Jam)
        run: |
          echo "Memulai proses backup data server..."
          # Mengkompresi folder data server game
          sudo tar -czvf backup-server.tar.gz /var/lib/pterodactyl/volumes || true
          echo "Backup selesai! (Pastikan menambahkan script upload ke cloud di baris ini jika diperlukan)"

      - name: Auto Up Trigger (Restart Workflow)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Men-trigger workflow baru sebelum runner ini mati..."
          # Menggunakan GitHub CLI untuk mengirim sinyal auto-restart
          gh api -X POST /repos/${{ github.repository }}/dispatches \
            -H "Accept: application/vnd.github.v3+json" \
            -f event_type=auto-restart
            
