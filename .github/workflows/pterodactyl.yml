name: Pterodactyl CI/CD Server

on:
  workflow_dispatch: # Bisa dijalankan manual
  repository_dispatch:
    types: [auto-restart] # Dijalankan oleh trigger Auto-Up

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Cloudflare Tunnel (Expose IP)
        run: |
          # Menggunakan Cloudflared untuk mengekspos Panel (Port 80) dan Wings (Port 8080/2022)
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          # Membutuhkan token dari rahasia GitHub
          sudo cloudflared service install ${{ secrets.CF_TUNNEL_TOKEN }} &
          sleep 5

      - name: Install Pterodactyl Panel (Dockerized)
        run: |
          # Untuk lingkungan CI/CD, menginstall Panel via Docker Compose adalah cara tercepat.
          # Pastikan file docker-compose.yml untuk Panel sudah ada di repositori kamu.
          docker-compose up -d panel
          echo "Pterodactyl Panel berhasil dijalankan via Docker!"

      - name: Install & Configure Wings
        run: |
          echo "Mulai menginstal Wings..."
          sudo mkdir -p /etc/pterodactyl
          # Download Wings
          curl -L -o /usr/local/bin/wings "https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64"
          sudo chmod u+x /usr/local/bin/wings
          
          # Memasukkan konfigurasi Wings dari GitHub Secrets
          # (Kamu harus men-generate config.yml dari panel dan menyimpannya di GitHub Secrets)
          echo "${{ secrets.WINGS_CONFIG }}" | sudo tee /etc/pterodactyl/config.yml
          
          # Menjalankan Wings di background
          sudo /usr/local/bin/wings &
          echo "Wings berjalan di background!"

      - name: Keep-Alive & Wait for 5 Hours
        run: |
          echo "Server sedang online. Menunggu 5 jam sebelum siklus backup dan restart..."
          # 5 jam = 18000 detik. GitHub limit adalah 6 jam (21600 detik).
          sleep 18000 

      - name: Auto Backup (Setelah 5 Jam)
        run: |
          echo "Memulai proses backup data server..."
          # Mengkompresi folder data server game (biasanya di /var/lib/pterodactyl/volumes)
          sudo tar -czvf backup-server.tar.gz /var/lib/pterodactyl/volumes
          
          # Opsional: Upload file backup ini ke layanan cloud (misal S3, Google Drive via rclone)
          # Contoh jika menggunakan bash upload sederhana:
          # curl -F "file=@backup-server.tar.gz" https://api.anonfiles.com/upload
          echo "Backup selesai!"

      - name: Auto Up Trigger (Restart Workflow)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Men-trigger workflow baru sebelum runner ini mati..."
          # Menggunakan GitHub CLI untuk mengirim sinyal repository_dispatch
          gh api -X POST /repos/${{ github.repository }}/dispatches \
            -H "Accept: application/vnd.github.v3+json" \
            -f event_type=auto-restart
            
