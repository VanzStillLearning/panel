name: Pterodactyl CI/CD Server

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [auto-restart] 

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Localtunnel (Expose IP)
        run: |
          echo "Menginstal Node.js dan Localtunnel..."
          sudo apt-get install -y nodejs npm
          sudo npm install -g localtunnel
          
          echo "Menjalankan Localtunnel di background..."
          lt --port 80 --subdomain my-ptero-panel > tunnel.log 2>&1 &
          
          echo "Menunggu Localtunnel aktif..."
          sleep 10
          
          echo "======================================"
          echo "LINK PTERODACTYL PANEL KAMU:"
          cat tunnel.log
          echo "======================================"

      - name: Install Pterodactyl Panel & Tunggu Database Siap
        run: |
          echo "Menjalankan docker-compose.yml..."
          docker compose up -d
          
          echo "Mengecek status MariaDB (Tunggu sampai siap 100%)..."
          # Sistem pintar: Loop ini akan terus ngecek database, tidak pakai tebak waktu lagi!
          until docker exec pterodactyl_db mysqladmin ping -u root -proot_password --silent; do
            echo 'Database masih booting, nunggu 3 detik lagi...'
            sleep 3
          done
          echo "DATABASE SUDAH SIAP! Lanjut setup Pterodactyl..."
          
          # Setup Panel (Pasti tembus karena database udah ready)
          docker exec pterodactyl_panel php artisan migrate --seed --force
          docker exec pterodactyl_panel php artisan view:clear
          docker exec pterodactyl_panel php artisan config:clear
          
          echo "Membuat Akun Admin..."
          docker exec pterodactyl_panel php artisan p:user:make --email="admin@admin.com" --username="admin" --name-first="Admin" --name-last="User" --password="admin123" --admin=1 || true
          
          echo "Pterodactyl Panel sukses dieksekusi!"

      - name: Install & Configure Wings
        run: |
          echo "Mulai menginstal Wings..."
          sudo mkdir -p /etc/pterodactyl
          
          curl -L -o /usr/local/bin/wings "https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64"
          sudo chmod u+x /usr/local/bin/wings
          
          echo "${{ secrets.WINGS_CONFIG }}" | sudo tee /etc/pterodactyl/config.yml
          
          sudo /usr/local/bin/wings &
          echo "Wings berjalan di background!"

      - name: Keep-Alive & Wait for 5 Hours
        run: |
          echo "Server online..."
          sleep 18000 

      - name: Auto Backup
        run: |
          sudo tar -czvf backup-server.tar.gz /var/lib/pterodactyl/volumes || true
          echo "Backup selesai!"

      - name: Auto Up Trigger (Restart)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh api -X POST /repos/${{ github.repository }}/dispatches \
            -H "Accept: application/vnd.github.v3+json" \
            -f event_type=auto-restart
            
