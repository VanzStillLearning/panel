version: '3.8'

services:
  panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: pterodactyl_panel
    ports:
      - "80:80"
    environment:
      - APP_URL=https://my-ptero-panel.loca.lt
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=panel
      - DB_USERNAME=pterodactyl
      - DB_PASSWORD=pterodactyl_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_ENV=production
      - APP_ENVIRONMENT_ONLY=false
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - mariadb
      - redis
    restart: always

  mariadb:
    image: mariadb:10.5
    container_name: pterodactyl_db
    environment:
      - MYSQL_DATABASE=panel
      - MYSQL_USER=pterodactyl
      - MYSQL_PASSWORD=pterodactyl_password
      - MYSQL_ROOT_PASSWORD=root_password
    restart: always

  redis:
    image: redis:alpine
    container_name: pterodactyl_redis
    restart: always
    
